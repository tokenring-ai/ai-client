xAi:
  provider: xai
  apiKeyFromEnv: XAI_API_KEY
  models:
    chat:
      grok-4.20-0309-reasoning:
        costPerMillionInputTokens: 2.0
        costPerMillionOutputTokens: 6.0
        maxContextLength: 2000000
      grok-4.20-0309-non-reasoning:
        costPerMillionInputTokens: 2.0
        costPerMillionOutputTokens: 6.0
        maxContextLength: 2000000
      grok-4.20-multi-agent-0309:
        costPerMillionInputTokens: 2.0
        costPerMillionOutputTokens: 6.0
        maxContextLength: 2000000
      grok-4.3:
        costPerMillionInputTokens: 1.25
        costPerMillionCachedInputTokens: 0.20
        costPerMillionOutputTokens: 2.50
        maxContextLength: 1000000

    imageGeneration:
      grok-imagine-image-quality:
        costPerImage: 0.05
      grok-imagine-image:
        costPerImage: 0.02
    videoGeneration:
      grok-imagine-video:
        costPerSecond: 0.05
